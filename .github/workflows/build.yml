name: Build Docker Image

on:
  workflow_call:
    inputs:
      service_name:
        description: 'Service name'
        required: true
        type: string
      build_tag:
        description: 'Build tag / Docker image tag'
        required: true
        type: string
      environment:
        description: 'Deployment environment'
        required: true
        type: string
      should_deploy:
        description: 'Whether deployment should proceed'
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      AWS_DEFAULT_REGION:
        required: true

jobs:
  build:
    name: Build
    runs-on: [self-hosted]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build Docker image
        if: inputs.should_deploy == 'true'
        run: |
          BUILD_TAG="${{ inputs.build_tag }}"
          SERVICE_NAME="${{ inputs.service_name }}"
          AWS_ACCOUNT_ID="${{ secrets.AWS_ACCOUNT_ID }}"
          AWS_REGION="${{ secrets.AWS_DEFAULT_REGION }}"
          
          IMAGE_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${SERVICE_NAME}:${BUILD_TAG}"
          
          echo "Building Docker image: ${IMAGE_REGISTRY}"
          docker build -t "${IMAGE_REGISTRY}" .
          docker push "${IMAGE_REGISTRY}"
          echo "image=${IMAGE_REGISTRY}" >> $GITHUB_OUTPUT
          echo "Docker image pushed: ${IMAGE_REGISTRY}"
